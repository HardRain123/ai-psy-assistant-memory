    - data:
        code: |-
          import json


          def as_bool(value, default=False):
              if isinstance(value, bool):
                  return value
              if isinstance(value, (int, float)):
                  return value != 0
              if isinstance(value, str):
                  return value.strip().lower() in ["true", "1", "yes", "y", "是"]
              return default


          def main(
              end_intent_text: str = "",
              current_query: str = "",
              can_continue=True,
              session_stage: str = "",
              remaining_minutes=50,
          ) -> dict:
              try:
                  data = json.loads(end_intent_text) if isinstance(end_intent_text, str) and end_intent_text.strip() else {}
              except Exception:
                  data = {}

              query = (current_query or "").strip()
              explicit_end_markers = [
                  "不想聊了", "先不聊了", "今天到这里", "今天就到这",
                  "结束咨询", "结束对话", "下次再聊", "我想结束",
              ]
              fatigue_markers = ["困了", "好困", "累了", "想睡", "没力气"]
              explicit_end = any(marker in query for marker in explicit_end_markers)
              fatigue_only = any(marker in query for marker in fatigue_markers) and not explicit_end

              model_wants_end = as_bool(data.get("user_wants_end"), False)
              confidence = data.get("confidence", 0)
              try:
                  confidence = float(confidence)
              except Exception:
                  confidence = 0.0

              if fatigue_only:
                  return {
                      "user_wants_end": False,
                      "should_close": False,
                      "confidence": confidence,
                      "reason": "fatigue_without_explicit_end",
                  }

              try:
                  remaining = float(remaining_minutes)
              except Exception:
                  remaining = 50.0
              forced_close = (
                  not as_bool(can_continue, True)
                  or remaining <= 0
                  or (session_stage or "").strip().lower() in ["closing", "ending", "ended", "closed"]
              )
              user_wants_end = explicit_end or (model_wants_end and confidence >= 0.7)
              return {
                  "user_wants_end": user_wants_end,
                  "should_close": forced_close or user_wants_end,
                  "confidence": confidence,
                  "reason": "explicit_end" if explicit_end else str(data.get("reason") or "continue"),
              }
        code_language: python3
        outputs:
          confidence:
            children: null
            type: number
          reason:
            children: null
            type: string
          should_close:
            children: null
            type: boolean
          user_wants_end:
            children: null
            type: boolean
