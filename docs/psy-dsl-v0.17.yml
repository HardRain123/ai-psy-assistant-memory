          \   text = re.sub(r\"^```\\s*\", \"\", text)\n    text = re.sub(r\"\\s*```$\"\
          , \"\", text)\n    match = re.search(r\"\\{.*\\}\", text, re.S)\n    return\
          \ match.group(0) if match else text\n\n\ndef parse_bool(value):\n    if\
          \ isinstance(value, bool):\n        return value\n    if isinstance(value,\
          \ str):\n        return value.strip().lower() in [\"true\", \"1\", \"yes\"\
          , \"y\"]\n    return bool(value)\n\n\ndef main(risk_text: str, current_query:\
          \ str = \"\", transcript_text: str = \"\") -> dict:\n    level = \"low\"\
          \n    need_safety_check = False\n    reason = \"未发现安全风险\"\n\n    if risk_text:\n\
          \        try:\n            data = json.loads(clean_json(risk_text))\n  \
          \          level = str(data.get(\"risk_level\", \"low\")).lower().strip()\n\
          \n            if level not in [\"low\", \"medium\", \"high\"]:\n       \
          \         level = \"low\"\n\n            need_safety_check = parse_bool(\n\
          \                data.get(\"need_safety_check\", level in [\"medium\", \"\
          high\"])\n            )\n\n            reason = str(data.get(\"reason\"\
          , reason))[:50]\n        except Exception:\n            level = \"low\"\n\
          \            need_safety_check = False\n            reason = \"risk parse\
          \ failed, default low\"\n\n    # 关键：只看当前用户输入，不扫描 transcript，避免助手自己的安全话术污染判断\n\
          \    q = current_query or \"\"\n\n    medium_markers = [\n        \"活着没意思\"\
          , \"活着没意义\", \"活着没有意思\", \"活着没有意义\",\n        \"不想存在\", \"想消失\", \"撑不下去\"\
          , \"不想活\",\n        \"生命没意义\", \"存在没意义\"\n    ]\n\n    high_markers = [\n\
