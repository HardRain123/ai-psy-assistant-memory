    - data:
        code: "import json\nimport re\n\ndef main(summary_text: str) -> dict:\n  \
          \  if not summary_text:\n        return {\n            \"summary\": \"\"\
          ,\n            \"core_topics\": \"\",\n            \"next_focus\": \"\"\
          ,\n            \"parse_success\": False\n        }\n\n    text = summary_text.strip()\n\
          \n    # 去掉可能出现的 Markdown 代码块\n    text = re.sub(r\"^```json\\s*\", \"\"\
          , text)\n    text = re.sub(r\"^```\\s*\", \"\", text)\n    text = re.sub(r\"\
          \\s*```$\", \"\", text)\n\n    try:\n        data = json.loads(text)\n \
          \   except Exception:\n        return {\n            \"summary\": \"\",\n\
          \            \"core_topics\": \"\",\n            \"next_focus\": \"\",\n\
          \            \"parse_success\": False\n        }\n\n    summary = data.get(\"\
          summary\", \"\")\n    core_topics = data.get(\"core_topics\", \"\")\n  \
          \  next_focus = data.get(\"next_focus\", \"\")\n\n    if isinstance(core_topics,\
          \ list):\n        core_topics = \"，\".join([str(x) for x in core_topics])\n\
          \n    if not isinstance(summary, str):\n        summary = str(summary)\n\
          \n    if not isinstance(core_topics, str):\n        core_topics = str(core_topics)\n\
          \n    if not isinstance(next_focus, str):\n        next_focus = str(next_focus)\n\
          \n    return {\n        \"summary\": summary.strip(),\n        \"core_topics\"\
          : core_topics.strip(),\n        \"next_focus\": next_focus.strip(),\n  \
