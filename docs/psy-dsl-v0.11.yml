            \ = true 的情况包括：\n- 用户明确说今天先到这里\n- 用户说差不多了、先这样、下次再聊\n- 用户表示现在不想继续说\n- 用户表示想暂停本次对话\n\
            - 用户表达“我先走了”“我要去忙了”\n- 用户虽然没有说“结束”，但语义上是在收束本次咨询\n\n判断为 false 的情况包括：\n\
            - 用户只是问“什么时候结束”\n- 用户质疑为什么要结束\n- 用户说“然后呢”“接下来怎么办”“什么时候能改”\n- 用户还在提出新问题、要求计划、要求建议\n\
            - 用户只是说“不知道怎么说”，但没有表达结束\n- 用户只是情绪低落或沉默倾向，不等于结束\n- 用户只是说“困了”“好困”“有点累”“状态不好”，不等于结束\n- 如果用户只是表达困倦或疲惫，要先询问是休息还是轻轻继续几分钟；只有明确说“今天先到这里/我要去睡了/先不聊了”才算结束\n\n用户当前输入：\n{{#sys.query#}}\n\
            \n当前对话记录：\n{{#17798742810070.transcript_text#}}"
