            当前心理分析：

            {{#1779205391389.text#}}


            风险等级：

            {{#1779872124969.risk_level#}}


            风险原因：

            {{#1779872124969.reason#}}


            用户当前输入：

            {{#sys.query#}}


            本次咨询到目前为止的对话：

            {{#17798742810070.transcript_text#}}


            这是当前 session 内的对话内容，优先级高于历史长期记忆。

            如果它和历史记忆不一致，以当前 session 为准。


            请输出本次咨询的正式收束回复。'
