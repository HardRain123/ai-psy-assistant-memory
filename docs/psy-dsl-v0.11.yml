    - data:
        code: "import re\nimport json\nimport html\n\ndef strip_reasoning_blocks(text:\
          \ str) -> str:\n    text = re.sub(r\"<details[\\s\\S]*?</details>\", \"\"\
          , text, flags=re.I)\n    text = re.sub(r\"<think[\\s\\S]*?</think>\", \"\
          \", text, flags=re.I)\n    text = re.sub(r\"<[^>]+>\", \"\", text)\n   \
          \ return text\n\ndef normalize_text(text: str) -> str:\n    text = html.unescape(text\
          \ or \"\").strip()\n    text = re.sub(r\"^```(?:json|text|markdown)?\\s*\"\
          , \"\", text, flags=re.I)\n    text = re.sub(r\"\\s*```$\", \"\", text)\n\
          \    text = strip_reasoning_blocks(text)\n    text = re.sub(r\"\\n{3,}\"\
          , \"\\n\\n\", text)\n    return text.strip()\n\ndef main(profile_check_text:\
          \ str) -> dict:\n    if not profile_check_text:\n        return {\n    \
          \        \"should_save\": False,\n            \"profile_memory\": \"\",\n\
          \            \"reason\": \"empty\"\n        }\n\n    raw = normalize_text(profile_check_text)\n\
          \n    hard_pollution_markers = [\n        \"<details\",\n        \"<think\"\
          ,\n        \"Thinking\",\n        \"思考过程\",\n        \"分析过程\",\n       \
          \ \"我需要分析\",\n        \"我需要先\",\n        \"```\"\n    ]\n\n    if any(marker\
          \ in raw for marker in hard_pollution_markers):\n        return {\n    \
          \        \"should_save\": False,\n            \"profile_memory\": \"\",\n\
          \            \"reason\": \"contains_reasoning_or_markup\"\n        }\n\n\
          \    try:\n        data = json.loads(raw)\n    except Exception:\n     \
          \   return {\n            \"should_save\": False,\n            \"profile_memory\"\
          : \"\",\n            \"reason\": \"invalid_json\"\n        }\n\n    profile_memory\
          \ = normalize_text(data.get(\"profile_memory\", \"\"))\n    should_save\
          \ = bool(data.get(\"should_save\", True))\n    reason = str(data.get(\"\
          reason\", \"\")).strip() or \"ok\"\n\n    if not should_save:\n        return\
          \ {\n            \"should_save\": False,\n            \"profile_memory\"\
          : \"\",\n            \"reason\": reason\n        }\n\n    if len(profile_memory)\
          \ < 20:\n        return {\n            \"should_save\": False,\n       \
          \     \"profile_memory\": \"\",\n            \"reason\": \"too_short\"\n\
          \        }\n\n    if len(profile_memory) > 800:\n        profile_memory\
          \ = profile_memory[:800].rstrip()\n\n    return {\n        \"should_save\"\
          : True,\n        \"profile_memory\": profile_memory,\n        \"reason\"\
          : reason\n    }"
