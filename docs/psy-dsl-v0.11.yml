    - data:
        code: "import json\n\ndef main(body: str) -> dict:\n    if not body:\n   \
          \     return {\n            \"transcript_text\": \"\",\n            \"message_count\"\
          : 0,\n            \"has_transcript\": False\n        }\n\n    # Dify HTTP\
          \ 节点传进来的 body 通常是 JSON 字符串\n    if isinstance(body, str):\n        try:\n\
          \            data = json.loads(body)\n        except Exception:\n      \
          \      return {\n                \"transcript_text\": \"\",\n          \
          \      \"message_count\": 0,\n                \"has_transcript\": False\n\
          \            }\n    else:\n        data = body\n\n    transcript_text =\
          \ data.get(\"transcript_text\", \"\")\n    messages = data.get(\"messages\"\
          , [])\n\n    # 兜底：如果后端没有返回 transcript_text，就从 messages 拼\n    if not transcript_text\
          \ and isinstance(messages, list):\n        lines = []\n\n        for msg\
          \ in messages:\n            role = msg.get(\"role\", \"\")\n           \
          \ content = msg.get(\"content\", \"\")\n\n            if not content:\n\
          \                continue\n\n            if role == \"user\":\n        \
          \        role_name = \"用户\"\n            elif role == \"assistant\":\n \
          \               role_name = \"咨询师\"\n            else:\n               \
          \ role_name = role or \"未知\"\n\n            lines.append(f\"{role_name}：{content}\"\
          )\n\n        transcript_text = \"\\n\".join(lines)\n\n    transcript_text\
          \ = transcript_text.strip()\n\n    return {\n        \"transcript_text\"\
          : transcript_text,\n        \"message_count\": len(messages) if isinstance(messages,\
          \ list) else 0,\n        \"has_transcript\": bool(transcript_text)\n   \
          \ }"
