    - data:
        code: "import json\nimport re\n\ndef main(intent_text: str, current_query:\
          \ str, can_continue: bool, session_stage: str, remaining_minutes: float)\
          \ -> dict:\n    user_wants_end\
          \ = False\n    confidence = 0.0\n    reason = \"\"\n\n    if intent_text:\n\
          \        text = intent_text.strip()\n        text = re.sub(r\"^```json\\\
          s*\", \"\", text)\n        text = re.sub(r\"^```\\s*\", \"\", text)\n  \
          \      text = re.sub(r\"\\s*```$\", \"\", text)\n\n        match = re.search(r\"\
          \\{.*\\}\", text, re.S)\n        if match:\n            text = match.group(0)\n\
          \n        try:\n            data = json.loads(text)\n            user_wants_end\
          \ = bool(data.get(\"user_wants_end\", False))\n            confidence =\
          \ float(data.get(\"confidence\", 0.0))\n            reason = str(data.get(\"\
          reason\", \"\")).strip()\n        except Exception:\n            reason\
          \ = \"parse_failed\"\n\n    try:\n        remaining = float(remaining_minutes\
          \ or 0)\n    except Exception:\n        remaining = 0\n\n    current_query\
          \ = (current_query or \"\").strip()\n    fatigue_markers = [\"困\", \"累\"\
          , \"疲惫\", \"没精神\", \"状态不好\"]\n    explicit_end_markers = [\"今天先到这里\"\
          , \"先到这里\", \"下次再聊\", \"先不聊\", \"不聊了\", \"我要睡了\", \"去睡了\"\
          , \"睡觉了\", \"我要走了\", \"先走了\"]\n    fatigue_only = any(marker in current_query\
          \ for marker in fatigue_markers) and not any(marker in current_query for\
          \ marker in explicit_end_markers)\n    if fatigue_only:\n        user_wants_end\
          \ = False\n        reason = \"fatigue_without_explicit_end\"\n\n    time_should_close\
          \ = (can_continue is False) or session_stage in [\"ending\", \"ended\"]\
          \ or remaining <= 2\n    should_close = time_should_close or (user_wants_end\
          \ and confidence >= 0.65)\n\n    return {\n        \"user_wants_end\": user_wants_end,\n\
          \        \"should_close\": should_close,\n        \"time_should_close\"\
          : time_should_close,\n        \"confidence\": confidence,\n        \"reason\"\
          : reason,\n        \"remaining_minutes_text\": str(round(remaining, 1)),\n\
          \        \"user_wants_end_text\": \"true\" if user_wants_end else \"false\"\
          ,\n        \"should_close_text\": \"true\" if should_close else \"false\"\
          ,\n        \"time_should_close_text\": \"true\" if time_should_close else\
          \ \"false\",\n        \"confidence_text\": str(round(confidence, 2))\n \
          \   }"
