            9. 用户明确表达的风险信息或安全确认结果。\n\n# 不要保存\n\n1. 寒暄。\n2. 临时情绪。\n3. 助手说过的话。\n4. 空泛总结。\n\
            5. 诊断标签。\n6. 没有新信息的重复内容。\n7. 低内容 session。\n8. “用户主要表达为：你好”这类无意义总结。\n9.\
            \ 防御、创伤、测试咨询师、完美主义、深层动机、潜意识、人格问题等无证据强解释标签。\n10. 用户没有确认过的计划。\n11. 只出现一次、没有长期意义的具体细节。\n\
            \n# 判断规则\n\n如果用户本轮只是说“你好”“嗯”“不知道”“继续”等，没有提供新的有效信息，则返回：\n\n{\n  \"should_save\"\
