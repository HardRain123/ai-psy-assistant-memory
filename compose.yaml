services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-psy-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_psy_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-ai_psy_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ai_psy_app} -d ${POSTGRES_DB:-ai_psy_assistant}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
